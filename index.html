<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNILIV</title>
  <meta name="description" content="Uniliv Platform: Resident-First, Data-Driven Digital Platform. Delivered by Enaacreations. For Residents and Employees." />
  <meta name="theme-color" content="#0C1220" />

  <!-- Open Graph for WhatsApp & Social Sharing -->
  <meta property="og:title" content="UNILIV Platform" />
  <meta property="og:site_name" content="Uniliv" />
  <meta property="og:description" content="A Data-Driven, Resident-First Digital Platform for Residents and Employees, delivered by Enaacreations." />
  <meta property="og:image" content="https://uniliv-brief.enaacreations.com/images/uniliv-large-logo.png" />
  <meta property="og:image:alt" content="Uniliv logo and platform preview" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://uniliv-brief.enaacreations.com" />

  <!-- WhatsApp/Sharing friendly icons -->
  <link rel="icon" type="image/png" href="images/uniliv-square-logo.png" />

  <!-- Twitter Card for WhatsApp fallback (some clients use it) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="UNILIV Platform" />
  <meta name="twitter:description" content="A Data-Driven, Resident-First Digital Platform for Residents and Employees, delivered by Enaacreations." />
  <meta name="twitter:image" content="https://yourdomain.com/images/uniliv-social-preview.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0C1220;
      --bg2:       #111827;
      --card:      #1A2540;
      --card2:     #162035;
      --border:    rgba(255,255,255,0.08);
      --cyan:      #22D3EE;
      --cyan-dim:  rgba(34,211,238,0.12);
      --cyan-glow: rgba(34,211,238,0.25);
      --purple:    #818CF8;
      --green:     #34D399;
      --amber:     #FBBF24;
      --text:      #F1F5F9;
      --text2:     #94A3B8;
      --text3:     #64748B;
      --radius:    12px;
      --radius-lg: 18px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    #root { height: 100%; }

    /* ── Presentation Shell ── */
    .shell {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* Progress bar */
    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.06);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(12,18,32,0.9);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .topbar-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--cyan);
      text-transform: uppercase;
    }
    .topbar-meta {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.06em;
    }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 5px;
    }
    .icon-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }

    /* Slide viewport */
    .slide-viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .slide-track {
      display: flex;
      height: 100%;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .slide-frame {
      min-width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 32px 56px;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: var(--card) transparent;
    }
    .slide-frame::-webkit-scrollbar { width: 4px; }
    .slide-frame::-webkit-scrollbar-thumb { background: var(--card); border-radius: 4px; }

    /* Bottom nav */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 14px 28px;
      border-top: 1px solid var(--border);
      background: rgba(12,18,32,0.9);
      flex-shrink: 0;
      z-index: 10;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 7px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      border-radius: 10px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .nav-btn:hover:not(:disabled) {
      border-color: var(--cyan);
      color: var(--cyan);
      background: var(--cyan-dim);
      transform: translateY(-1px);
    }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    .nav-btn.primary {
      background: linear-gradient(135deg, rgba(34,211,238,0.15), rgba(129,140,248,0.15));
      border-color: rgba(34,211,238,0.3);
      color: var(--text);
    }
    .nav-btn.primary:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(34,211,238,0.25), rgba(129,140,248,0.25));
    }

    .dot-nav { display: flex; gap: 7px; align-items: center; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text3);
      cursor: pointer;
      transition: all 0.2s;
    }
    .dot.active {
      width: 22px;
      border-radius: 3px;
      background: var(--cyan);
    }
    .dot:hover:not(.active) { background: var(--text2); }

    .slide-counter {
      font-size: 12px;
      color: var(--text3);
      letter-spacing: 0.06em;
      min-width: 48px;
      text-align: center;
    }

    /* ════════════════════════════════
       SLIDE COMPONENTS
    ════════════════════════════════ */

    /* Slide section label */
    .slide-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .slide-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan-dim), transparent);
    }

    /* Slide title */
    .slide-title {
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .slide-subtitle {
      font-size: 14px;
      color: var(--text3);
      font-weight: 400;
      margin-bottom: 28px;
    }

    /* ── Slide 1: Title ── */
    .title-slide {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: visible;
    }
    .title-bg-glow {
      position: absolute;
      top: -220px; left: -220px;
      width: 820px; height: 820px;
      background: radial-gradient(circle, rgba(34,211,238,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .title-bg-glow2 {
      position: absolute;
      bottom: -180px; right: -180px;
      width: 640px; height: 640px;
      background: radial-gradient(circle, rgba(129,140,248,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .title-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--cyan-dim);
      border: 1px solid rgba(34,211,238,0.25);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 20px;
      width: fit-content;
    }
    .title-main {
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      background: linear-gradient(135deg, #fff 20%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .title-tagline {
      font-size: clamp(18px, 2.5vw, 26px);
      font-weight: 300;
      color: var(--text2);
      line-height: 1.4;
      margin-bottom: 10px;
      max-width: 560px;
    }
    .title-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 40px;
    }
    .title-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 14px;
      font-size: 12px;
      color: var(--text3);
    }
    .title-stats {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 24px;
      min-width: 130px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--cyan-dim); }
    .stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--cyan);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .title-footer {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.04em;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    /* ── Scope Slide ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      flex: 1;
    }
    .col-panel {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .panel-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .panel-header.challenge { color: #F87171; }
    .panel-header.building  { color: var(--cyan); }

    .item-row {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .item-row:last-child { border-bottom: none; padding-bottom: 0; }
    .item-icon {
      font-size: 18px;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
      line-height: 1.4;
    }
    .item-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }
    .item-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
    }

    /* ── Architecture Slide ── */
    .arch-slide { display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .arch-layer {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .arch-layer:hover { border-color: rgba(34,211,238,0.2); }
    .layer-badge {
      background: var(--cyan-dim);
      border: 1px solid rgba(34,211,238,0.3);
      border-radius: 8px;
      padding: 6px 10px;
      flex-shrink: 0;
      text-align: center;
      min-width: 78px;
    }
    .layer-num {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--cyan);
      text-transform: uppercase;
    }
    .layer-name {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-top: 2px;
      line-height: 1.3;
    }
    .layer-content { flex: 1; }
    .layer-heading {
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .arch-tag {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text2);
      white-space: nowrap;
    }
    .arch-tag.accent { background: var(--cyan-dim); border-color: rgba(34,211,238,0.25); color: var(--cyan); }
    .arch-tag.purple { background: rgba(129,140,248,0.12); border-color: rgba(129,140,248,0.25); color: var(--purple); }
    .arch-footer {
      background: rgba(34,211,238,0.06);
      border: 1px solid rgba(34,211,238,0.15);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 11px;
      color: var(--text2);
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* ── AI Slide ── */
    .ai-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      flex: 1;
    }
    .ai-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.25s, transform 0.2s;
    }
    .ai-card:hover { border-color: rgba(34,211,238,0.3); transform: translateY(-2px); }
    .ai-card-icon { font-size: 26px; line-height: 1; }
    .ai-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .ai-flow {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ai-step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 11.5px;
      color: var(--text2);
      line-height: 1.4;
    }
    .ai-arrow {
      color: var(--cyan);
      font-size: 10px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    /* ── Wallet Slide ── */
    .wallet-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1.4fr;
      gap: 20px;
      flex: 1;
    }
    .wallet-left {
      background: linear-gradient(160deg, #1A2540 0%, #111827 100%);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: var(--radius-lg);
      padding: 22px;
      display: flex;
      flex-direction: column;
    }
    .wallet-emblem {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 14px;
    }
    .wallet-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .wallet-sub {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 18px;
    }
    .wallet-items { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .wallet-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px;
      color: var(--text2);
    }
    .wallet-item .check {
      width: 16px; height: 16px;
      background: rgba(52,211,153,0.15);
      border: 1px solid rgba(52,211,153,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      color: var(--green);
      flex-shrink: 0;
    }

    .benefit-panel {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .benefit-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .benefit-header.biz { color: var(--amber); }
    .benefit-header.res { color: var(--cyan); }
    .benefit-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .benefit-row {
      display: flex; gap: 10px;
      align-items: flex-start;
    }
    .benefit-icon {
      font-size: 16px;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
      margin-top: 1px;
    }
    .benefit-title { font-size: 12px; font-weight: 600; color: var(--text); }
    .benefit-desc { font-size: 11px; color: var(--text2); line-height: 1.4; margin-top: 1px; }

    /* ── Partnership Slide ── */
    .partner-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      flex: 1;
      align-items: start;
    }
    .partner-panel {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      min-width: 0;
    }
    .partner-panel.left { border-color: rgba(34,211,238,0.2); }
    .partner-panel.right { border-color: rgba(129,140,248,0.2); }
    .partner-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .partner-header.left { color: var(--cyan); }
    .partner-header.right { color: var(--purple); }
    .partner-items { display: flex; flex-direction: column; gap: 10px; }
    .partner-item {
      display: flex; gap: 10px; align-items: flex-start;
    }
    .partner-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }
    .partner-dot.cyan { background: var(--cyan); }
    .partner-dot.purple { background: var(--purple); }
    .partner-text { font-size: 13px; color: var(--text2); line-height: 1.5; }

    .times-sign {
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding-top: 60px;
    }
    .together-card {
      margin-top: 20px;
      background: linear-gradient(135deg, rgba(34,211,238,0.08), rgba(129,140,248,0.08));
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: var(--radius-lg);
      padding: 18px 24px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      text-align: center;
    }
    .together-card strong { color: var(--cyan); }

    /* Keyboard hint */
    .kbd-hint {
      font-size: 10px;
      color: var(--text3);
      display: flex; align-items: center; gap: 5px;
    }
    .kbd {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
    }

    @media (max-width: 900px) {
      .two-col { grid-template-columns: 1fr; }
      .ai-grid  { grid-template-columns: 1fr 1fr; }
      .wallet-grid { grid-template-columns: 1fr; }
      .partner-grid { grid-template-columns: 1fr; }
    }

    /* ════════════════════════════════
       CLIENT-READY VISUAL SYSTEM
    ════════════════════════════════ */

    :root {
      --bg: #07111f;
      --bg2: #0b1727;
      --surface: rgba(255, 255, 255, 0.075);
      --surface-strong: rgba(255, 255, 255, 0.105);
      --card: rgba(255, 255, 255, 0.078);
      --card2: rgba(255, 255, 255, 0.068);
      --border: rgba(209, 232, 255, 0.14);
      --border-strong: rgba(112, 194, 168, 0.35);
      --cyan: #70c2a8;
      --cyan-dim: rgba(112, 194, 168, 0.12);
      --cyan-glow: rgba(112, 194, 168, 0.26);
      --purple: #8fb4ff;
      --green: #70c2a8;
      --amber: #d8aa5e;
      --danger: #e48b7a;
      --text: #f7fbff;
      --text2: #c4d1df;
      --text3: #8292a5;
      --radius: 18px;
      --radius-lg: 26px;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    .shell[data-theme="light"] {
      --bg: #f6f1e8;
      --bg2: #ffffff;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: rgba(255, 255, 255, 0.95);
      --card: rgba(255, 255, 255, 0.86);
      --card2: rgba(255, 255, 255, 0.82);
      --border: rgba(18, 38, 63, 0.13);
      --border-strong: rgba(65, 139, 115, 0.34);
      --cyan: #2f8f72;
      --cyan-dim: rgba(47, 143, 114, 0.12);
      --cyan-glow: rgba(47, 143, 114, 0.2);
      --purple: #5d70b7;
      --green: #2f8f72;
      --amber: #9b6a1d;
      --danger: #b85d4d;
      --text: #102033;
      --text2: #3c4b5d;
      --text3: #6d7988;
      --shadow: 0 20px 56px rgba(39, 53, 74, 0.13);
    }

    html, body {
      background:
        radial-gradient(circle at 8% 8%, rgba(112, 194, 168, 0.2), transparent 28%),
        radial-gradient(circle at 92% 0%, rgba(143, 180, 255, 0.14), transparent 28%),
        linear-gradient(135deg, #07111f 0%, #0a1626 48%, #101827 100%);
      font-family: 'Manrope', ui-sans-serif, system-ui, sans-serif;
    }

    .shell {
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        radial-gradient(circle at 10% 0%, rgba(112, 194, 168, 0.18), transparent 32%),
        radial-gradient(circle at 82% 12%, rgba(143, 180, 255, 0.12), transparent 30%),
        var(--bg);
      background-size: 42px 42px, 42px 42px, auto, auto, auto;
    }

    .shell[data-theme="light"] {
      background:
        linear-gradient(rgba(20, 38, 58, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 38, 58, 0.045) 1px, transparent 1px),
        radial-gradient(circle at 8% 0%, rgba(47, 143, 114, 0.16), transparent 34%),
        radial-gradient(circle at 86% 12%, rgba(93, 112, 183, 0.12), transparent 32%),
        linear-gradient(135deg, #fbf8f1 0%, #f3f7f1 48%, #edf3f8 100%);
      background-size: 42px 42px, 42px 42px, auto, auto, auto;
    }

    .progress-bar { height: 4px; background: rgba(255, 255, 255, 0.06); }
    .progress-fill { background: linear-gradient(90deg, var(--cyan), #e5c07b, var(--purple)); }

    .topbar,
    .nav-bar {
      background: rgba(7, 17, 31, 0.78);
      border-color: rgba(209, 232, 255, 0.12);
      backdrop-filter: blur(18px);
    }

    .shell[data-theme="light"] .topbar,
    .shell[data-theme="light"] .nav-bar {
      background: rgba(255, 255, 255, 0.76);
      border-color: rgba(18, 38, 63, 0.11);
    }

    .topbar {
      padding: 13px 42px;
    }

    .topbar-logo {
      color: var(--text);
      font-size: 14px;
      letter-spacing: 0.22em;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo-mark {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.08);
      padding: 2px;
      box-shadow: 0 0 0 1px rgba(209, 232, 255, 0.16), 0 6px 14px rgba(0, 0, 0, 0.25);
    }

    .topbar-meta,
    .slide-counter,
    .kbd-hint {
      color: var(--text3);
    }

    .topbar-meta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-width: 0;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .topbar-deck-title {
      color: var(--text);
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .topbar-meta-divider {
      color: var(--text3);
      opacity: 0.75;
    }

    .icon-btn,
    .nav-btn,
    .kbd {
      background: rgba(255, 255, 255, 0.055);
      border-color: var(--border);
      color: var(--text2);
      border-radius: 999px;
    }

    .icon-btn:hover,
    .nav-btn:hover:not(:disabled) {
      background: rgba(112, 194, 168, 0.12);
      border-color: var(--border-strong);
      color: var(--text);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .nav-btn.primary {
      background: linear-gradient(135deg, rgba(112, 194, 168, 0.22), rgba(143, 180, 255, 0.16));
      border-color: var(--border-strong);
    }

    .theme-toggle {
      width: 38px;
      height: 38px;
      min-width: 38px;
      padding: 0;
      justify-content: center;
    }

    .theme-toggle svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: rgba(196, 209, 223, 0.35);
    }

    .dot.active {
      width: 30px;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
    }

    .slide-frame {
      padding: clamp(24px, 3.4vw, 46px) clamp(42px, 6vw, 86px);
    }

    .slide-label {
      width: fit-content;
      color: var(--cyan);
      font-size: 11px;
      letter-spacing: 0.22em;
      margin-bottom: 12px;
      padding: 7px 12px;
      border: 1px solid rgba(112, 194, 168, 0.22);
      border-radius: 999px;
      background: rgba(112, 194, 168, 0.08);
    }

    .slide-label::after { display: none; }

    .slide-title {
      max-width: 980px;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: clamp(32px, 3.6vw, 50px);
      font-weight: 700;
      line-height: 0.98;
      letter-spacing: -0.035em;
      margin-bottom: 14px;
    }

    .slide-subtitle {
      max-width: 960px;
      color: var(--text2);
      font-size: clamp(14px, 1.25vw, 18px);
      line-height: 1.55;
      margin-bottom: clamp(18px, 2.4vw, 30px);
    }

    .title-slide {
      justify-content: center;
      max-width: 1120px;
      margin: 0 auto;
      width: 100%;
      isolation: isolate;
    }

    .title-bg-glow,
    .title-bg-glow2 {
      filter: blur(8px);
      opacity: 0.85;
    }

    .title-bg-glow {
      background: radial-gradient(circle, rgba(112, 194, 168, 0.18), transparent 68%);
    }

    .title-bg-glow2 {
      background: radial-gradient(circle, rgba(143, 180, 255, 0.14), transparent 68%);
    }

    .title-tag {
      background: rgba(112, 194, 168, 0.1);
      border-color: rgba(112, 194, 168, 0.28);
      color: var(--text2);
      letter-spacing: 0.16em;
      padding: 8px 16px;
      margin-bottom: 26px;
    }

    .title-main {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: clamp(72px, 12vw, 148px);
      line-height: 0.82;
      letter-spacing: -0.06em;
      background: linear-gradient(125deg, #ffffff 18%, #d9f3ea 48%, var(--cyan) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      margin-bottom: 24px;
    }

    .title-brand {
      width: clamp(240px, 32vw, 420px);
      height: auto;
      margin-bottom: 14px;
      filter: drop-shadow(0 16px 34px rgba(0, 0, 0, 0.32));
      opacity: 0.95;
    }

    .title-tagline {
      color: var(--text2);
      font-size: clamp(22px, 2.8vw, 34px);
      font-weight: 500;
      line-height: 1.25;
      max-width: 780px;
      margin-bottom: 24px;
    }

    .title-pills {
      gap: 10px;
      margin-bottom: 34px;
    }

    .title-pill,
    .arch-tag {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(209, 232, 255, 0.13);
      color: var(--text2);
      border-radius: 999px;
    }

    .title-pill {
      padding: 7px 15px;
      font-size: 12px;
      letter-spacing: 0.03em;
    }

    .title-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(132px, 1fr));
      gap: 14px;
      margin-bottom: 34px;
    }

    .stat-card,
    .col-panel,
    .arch-layer,
    .ai-card,
    .wallet-left,
    .benefit-panel,
    .partner-panel,
    .together-card {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.045));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .shell[data-theme="light"] .stat-card,
    .shell[data-theme="light"] .col-panel,
    .shell[data-theme="light"] .arch-layer,
    .shell[data-theme="light"] .ai-card,
    .shell[data-theme="light"] .wallet-left,
    .shell[data-theme="light"] .benefit-panel,
    .shell[data-theme="light"] .partner-panel,
    .shell[data-theme="light"] .together-card,
    .shell[data-theme="light"] .tech-card,
    .shell[data-theme="light"] .sla-card,
    .shell[data-theme="light"] .delivery-card,
    .shell[data-theme="light"] .commercial-card {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.74));
      border-color: var(--border);
    }

    .stat-card {
      padding: 18px;
      min-width: 0;
      border-radius: 20px;
    }

    .stat-num {
      color: var(--text);
      font-size: clamp(30px, 3vw, 44px);
    }

    .stat-label {
      color: var(--text3);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .title-footer {
      max-width: 880px;
      color: var(--text2);
      font-size: 14px;
      line-height: 1.55;
      border-color: rgba(209, 232, 255, 0.14);
    }

    .two-col {
      gap: 24px;
      align-items: stretch;
    }

    .col-panel,
    .benefit-panel,
    .partner-panel {
      padding: 26px;
      border-radius: var(--radius-lg);
    }

    .panel-header,
    .benefit-header,
    .partner-header {
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.16em;
      border-color: rgba(209, 232, 255, 0.12);
      margin-bottom: 18px;
    }

    .panel-header.challenge { color: #f1ac9e; }
    .panel-header.building,
    .benefit-header.res,
    .partner-header.left { color: var(--cyan); }
    .benefit-header.biz { color: var(--amber); }
    .partner-header.right { color: var(--purple); }

    .item-row,
    .benefit-row,
    .partner-item {
      gap: 14px;
    }

    .item-row {
      padding: 14px 0;
      border-color: rgba(209, 232, 255, 0.08);
    }

    .item-icon,
    .ai-card-icon,
    .benefit-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: rgba(112, 194, 168, 0.11);
      border: 1px solid rgba(112, 194, 168, 0.22);
      color: var(--cyan);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      line-height: 1;
    }

    .item-title,
    .ai-card-title,
    .benefit-title {
      color: var(--text);
      font-size: 15px;
      line-height: 1.25;
    }

    .item-desc,
    .benefit-desc,
    .partner-text,
    .ai-step {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.55;
    }

    .arch-slide {
      gap: 10px;
    }

    .arch-layer {
      border-radius: 20px;
      padding: 12px 16px;
      align-items: center;
    }

    .layer-badge {
      background: rgba(112, 194, 168, 0.11);
      border-color: rgba(112, 194, 168, 0.24);
      border-radius: 16px;
      width: 168px;
      min-width: 168px;
      flex: 0 0 168px;
      padding: 10px 12px;
    }

    .layer-num,
    .layer-name {
      color: var(--cyan);
    }

    .layer-num {
      font-size: 10px;
      margin-bottom: 4px;
    }

    .layer-name {
      color: var(--text);
      font-size: 11px;
      line-height: 1.25;
    }

    .tag-row {
      gap: 7px;
    }

    .arch-tag {
      padding: 5px 9px;
      font-size: 11px;
      white-space: normal;
    }

    .arch-tag.accent {
      background: rgba(112, 194, 168, 0.12);
      border-color: rgba(112, 194, 168, 0.26);
      color: #d9f3ea;
    }

    .shell[data-theme="light"] .arch-tag.accent,
    .shell[data-theme="light"] .tech-stack strong,
    .shell[data-theme="light"] .sla-tat {
      color: #176c55;
    }

    .arch-footer {
      background: rgba(112, 194, 168, 0.09);
      border-color: rgba(112, 194, 168, 0.23);
      color: var(--text2);
      border-radius: 18px;
      padding: 11px 16px;
      font-size: 12px;
    }

    .tech-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      flex: initial;
    }

    .tech-card,
    .sla-card,
    .delivery-card,
    .commercial-card {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.045));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .shell[data-theme="light"] .title-pill,
    .shell[data-theme="light"] .arch-tag,
    .shell[data-theme="light"] .icon-btn,
    .shell[data-theme="light"] .nav-btn,
    .shell[data-theme="light"] .kbd,
    .shell[data-theme="light"] .partner-brand-chip,
    .shell[data-theme="light"] .sla-severity {
      background: rgba(255, 255, 255, 0.68);
      border-color: rgba(18, 38, 63, 0.12);
      color: var(--text2);
    }

    .tech-card {
      min-height: 136px;
      padding: 17px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }

    .tech-code {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      background: rgba(112, 194, 168, 0.11);
      border: 1px solid rgba(112, 194, 168, 0.24);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .tech-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .tech-stack {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.4;
    }

    .tech-stack strong {
      color: #d9f3ea;
      font-weight: 700;
    }

    .tech-footnote {
      margin-top: 14px;
      padding: 12px 16px;
      color: var(--text2);
      border: 1px solid rgba(112, 194, 168, 0.22);
      border-radius: 18px;
      background: rgba(112, 194, 168, 0.08);
      font-size: 12px;
      text-align: center;
    }

    .sla-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      flex: 1;
      align-items: stretch;
    }

    .sla-card {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 280px;
    }

    .sla-card.critical { border-color: rgba(228, 139, 122, 0.34); }
    .sla-card.high { border-color: rgba(216, 170, 94, 0.34); }
    .sla-card.medium { border-color: rgba(143, 180, 255, 0.3); }
    .sla-card.low { border-color: rgba(112, 194, 168, 0.28); }

    .sla-priority {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .sla-code {
      color: var(--text);
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .sla-severity {
      color: var(--text3);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .sla-title {
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .sla-desc {
      color: var(--text2);
      font-size: 14px;
      line-height: 1.55;
    }

    .sla-tat {
      margin-top: auto;
      color: #d9f3ea;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-top: 1px solid rgba(209, 232, 255, 0.12);
      padding-top: 14px;
    }

    .delivery-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
      flex: 1;
      align-items: stretch;
    }

    .delivery-card,
    .commercial-card {
      padding: 24px;
      min-width: 0;
    }

    .delivery-heading {
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(209, 232, 255, 0.12);
    }

    .phase-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(209, 232, 255, 0.08);
    }

    .phase-row:last-child { border-bottom: none; }

    .phase-day {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .phase-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .phase-desc {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.45;
    }

    .scope-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .scope-box {
      border: 1px solid rgba(209, 232, 255, 0.12);
      border-radius: 18px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.045);
    }

    .shell[data-theme="light"] .scope-box,
    .shell[data-theme="light"] .wallet-emblem,
    .shell[data-theme="light"] .deal-node {
      background: rgba(255, 255, 255, 0.74);
      border-color: rgba(18, 38, 63, 0.12);
    }

    .scope-title {
      color: var(--cyan);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .scope-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .scope-item {
      color: var(--text2);
      font-size: 12.5px;
      line-height: 1.3;
    }

    .commercial-total {
      color: var(--text);
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .commercial-sub {
      color: var(--text3);
      font-size: 12px;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .commercial-row {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(209, 232, 255, 0.08);
    }

    .commercial-row:last-child { border-bottom: none; }

    .commercial-percent {
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
    }

    .commercial-label {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.35;
    }

    .beyond-note {
      margin-top: 16px;
      color: var(--text2);
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid rgba(112, 194, 168, 0.2);
      border-radius: 16px;
      background: rgba(112, 194, 168, 0.08);
      padding: 13px 15px;
    }

    .ai-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .ai-card {
      padding: 22px;
      border-radius: 24px;
      min-height: 190px;
    }

    .ai-card:hover,
    .arch-layer:hover,
    .stat-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-2px);
    }

    .ai-card-icon {
      width: 38px;
      height: 38px;
      margin-bottom: 2px;
    }

    .ai-flow {
      gap: 7px;
    }

    .ai-arrow {
      color: var(--cyan);
      font-size: 15px;
      line-height: 1.2;
    }

    .wallet-grid {
      grid-template-columns: 0.9fr 1.35fr 1.35fr;
      gap: 22px;
    }

    .wallet-left {
      border-radius: var(--radius-lg);
      padding: 26px;
      background:
        radial-gradient(circle at 24% 8%, rgba(112, 194, 168, 0.22), transparent 34%),
        linear-gradient(150deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.045));
    }

    .wallet-emblem {
      background: rgba(255, 255, 255, 0.14);
      color: var(--text);
      border-radius: 18px;
      border: 1px solid rgba(209, 232, 255, 0.28);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
      padding: 8px;
    }

    .wallet-emblem img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.22));

    /* ─── App ─── */
    function App() {
      const [current, setCurrent] = useState(0);
      const [theme, setTheme] = useState(() => {
        try {
          return localStorage.getItem('uniliv-presentation-theme') || 'light';
        } catch {
          return 'light';
        }
      });
      const total = SLIDES.length;

      const prev = useCallback(() => setCurrent(c => Math.max(0, c - 1)), []);
      const next = useCallback(() => setCurrent(c => Math.min(total - 1, c + 1)), [total]);
      const toggleTheme = useCallback(() => {
        setTheme(currentTheme => currentTheme === 'dark' ? 'light' : 'dark');
      }, []);

      const toggleFullscreen = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen().catch(() => {});
        }
      };

      useEffect(() => {
        document.documentElement.dataset.theme = theme;
        try {
          localStorage.setItem('uniliv-presentation-theme', theme);
        } catch {}
      }, [theme]);

      useEffect(() => {
        const handler = (e) => {
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
            e.preventDefault(); next();
          }
          if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault(); prev();
          }
          if (e.key === 'f' || e.key === 'F') toggleFullscreen();
          if (e.key === 't' || e.key === 'T') toggleTheme();
          if (e.key === 'Home') setCurrent(0);
          if (e.key === 'End')  setCurrent(total - 1);
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [prev, next, total, toggleTheme]);

      const progress = ((current + 1) / total) * 100;
      const SlideNames = [
        'Home',
        'Scope',
        'Architecture',
        'Tech Stack',
        'Agentic AI',
        'Digital Wallet',
        'SLA',
        'Delivery',
        'Partnership'
      ];

      return (
        <div className="shell" data-theme={theme}>
          {/* Progress bar */}
          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${progress}%` }} />
          </div>

          {/* Top bar */}
          <div className="topbar">
            <div className="topbar-logo">
              <img className="topbar-logo-mark" src="images/uniliv-square-logo.png" alt="Uniliv mark" />
              <span>UNILIV</span>
            </div>
            <div className="topbar-meta">
              <span className="topbar-deck-title">Uniliv</span>
              <span className="topbar-meta-divider">/</span>
              <span>{SlideNames[current]}</span>
            </div>
            <div className="topbar-actions">
              <button
                className="icon-btn theme-toggle"
                onClick={toggleTheme}
                title={theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}
                aria-label={theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}
              >
                {theme === 'dark' ? (
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="12" r="4.5" strokeWidth="2" />
                    <path d="M12 2.5v2.2M12 19.3v2.2M4.7 4.7l1.6 1.6M17.7 17.7l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.7 19.3l1.6-1.6M17.7 6.3l1.6-1.6" strokeWidth="2" strokeLinecap="round" />
                  </svg>
                ) : (
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M20.2 15.2A8.2 8.2 0 0 1 8.8 3.8 8.5 8.5 0 1 0 20.2 15.2Z" strokeWidth="2" strokeLinejoin="round" />
                  </svg>
                )}
              </button>
            </div>
          </div>

          {/* Slide viewport */}
          <div className="slide-viewport">
            <div className="slide-track" style={{ transform: `translateX(-${current * 100}%)` }}>
              {SLIDES.map((slide, i) => {
                const Component = COMPONENTS[slide.component];
                return (
                  <div key={slide.id} className="slide-frame">
                    <Component />
                  </div>
                );
              })}
            </div>
          </div>

          {/* Bottom nav */}
          <div className="nav-bar">
            <button className="nav-btn" onClick={prev} disabled={current === 0}>
              ← Previous
            </button>
            <div className="dot-nav">
              {SLIDES.map((_, i) => (
                <div
                  key={i}
                  className={`dot${i === current ? ' active' : ''}`}
                  onClick={() => setCurrent(i)}
                  title={SlideNames[i]}
                />
              ))}
            </div>
            <span className="slide-counter">{current + 1} / {total}</span>
            <button className="nav-btn primary" onClick={next} disabled={current === total - 1}>
              Next →
            </button>
          </div>
        </div>
      );
    }
